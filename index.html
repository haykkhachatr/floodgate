<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1e293b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Floodgate — Location Mapper</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- MAP — always visible behind the modal -->
  <div id="map"></div>

  <!-- MODAL — opens immediately on top of the map -->
  <div id="modal">
    <div class="modal-card">
      <div class="modal-icon">📍</div>
      <h1>Floodgate</h1>
      <p class="modal-sub">Pin your exact GPS location on the shared map.</p>

      <!-- GPS status line: appears once location search starts -->
      <div id="gps-row" class="hidden">
        <span id="gps-dot" class="dot dot-amber"></span>
        <span id="gps-label">Finding your location…</span>
      </div>

      <!-- BUTTON 1: Turn On Location (hidden after GPS starts) -->
      <div id="enable-wrap">
        <button id="btn-turn-on">Turn On Location</button>
        <p class="modal-hint">Your browser will ask for permission — tap <strong>Allow</strong>.</p>
      </div>

      <!-- BUTTON 2: Fix My Location (always visible, activates when GPS is ready) -->
      <button id="btn-fix-modal" disabled>
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/>
          <circle cx="12" cy="10" r="3"/>
        </svg>
        Fix My Location
      </button>

      <!-- Error message -->
      <p id="modal-error" class="modal-error hidden"></p>
    </div>
  </div>

  <!-- TOP RIGHT: point list badge (shown after modal closes) -->
  <div id="top-badge" class="hidden">
    <button id="btn-open-list">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <line x1="8" y1="6"  x2="21" y2="6"/>  <line x1="8"  y1="12" x2="21"   y2="12"/>
        <line x1="8" y1="18" x2="21" y2="18"/> <line x1="3"  y1="6"  x2="3.01" y2="6"/>
        <line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
      </svg>
      <span id="badge-count">0</span> Points
    </button>
  </div>

  <!-- BOTTOM PANEL: live GPS status + fix again button + last result -->
  <div id="bottom-panel" class="hidden">
    <div id="gps-status">
      <span id="status-dot" class="dot dot-green"></span>
      <span id="status-label">GPS active</span>
    </div>
    <button id="btn-fix">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/>
        <circle cx="12" cy="10" r="3"/>
      </svg>
      Fix My Location
    </button>
    <div id="fix-result" class="hidden">
      <div class="result-row"><span class="result-label">Coordinates</span><span id="result-coords">—</span></div>
      <div class="result-row"><span class="result-label">Accuracy</span><span id="result-accuracy">—</span></div>
      <div class="result-row"><span class="result-label">Fixed at</span><span id="result-time">—</span></div>
      <button id="btn-copy" class="btn-copy">Copy Coordinates</button>
    </div>
  </div>

  <!-- RIGHT DRAWER: full list of points -->
  <div id="drawer" class="hidden">
    <div class="drawer-header">
      <span>All Recorded Points</span>
      <button id="btn-close-drawer">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div id="drawer-body"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
